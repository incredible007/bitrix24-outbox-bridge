version: '3.8'

# Production compose. Requires:
#   - infra-network to exist (docker network create infra-network)
#   - docker-compose.infra.yml running (for Redis)
#   - .env file on the server

services:
  app:
    image: registry.andrewpodgola.pro/bitrix24-outbox-bridge:latest
    container_name: bitrix24_outbox_bridge
    ports:
      - "25000:3000"
    env_file: .env
    networks:
      - infra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  infra-network:
    external: true
