name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.andrewpodgola.pro
  IMAGE_NAME: registry.andrewpodgola.pro/bitrix24-outbox-bridge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: >-
            APP_API_KEY,APP_NODE_ENV,APP_PORT,APP_DB_URL,
            APP_REDIS_HOST,APP_REDIS_PORT,APP_REDIS_TTL,
            APP_BULL_BOARD_USER,APP_BULL_BOARD_PASSWORD,
            APP_BITRIX_CLIENT_ID,APP_BITRIX_CLIENT_SECRET,
            APP_BITRIX_REDIRECT_URI,APP_BITRIX_DOMAIN
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            cat > .env << EOF
            API_KEY=${APP_API_KEY}
            NODE_ENV=${APP_NODE_ENV}
            PORT=${APP_PORT}
            DB_URL=${APP_DB_URL}
            REDIS_HOST=${APP_REDIS_HOST}
            REDIS_PORT=${APP_REDIS_PORT}
            REDIS_TTL=${APP_REDIS_TTL}
            BULL_BOARD_USER=${APP_BULL_BOARD_USER}
            BULL_BOARD_PASSWORD=${APP_BULL_BOARD_PASSWORD}
            BITRIX_CLIENT_ID=${APP_BITRIX_CLIENT_ID}
            BITRIX_CLIENT_SECRET=${APP_BITRIX_CLIENT_SECRET}
            BITRIX_REDIRECT_URI=${APP_BITRIX_REDIRECT_URI}
            BITRIX_DOMAIN=${APP_BITRIX_DOMAIN}
            EOF

            docker login registry.andrewpodgola.pro -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans
