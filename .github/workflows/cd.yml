name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.andrewpodgola.pro
  IMAGE_NAME: registry.andrewpodgola.pro/bitrix24-outbox-bridge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            cat > .env << 'ENVEOF'
            API_KEY=${{ secrets.APP_API_KEY }}
            NODE_ENV=${{ vars.APP_NODE_ENV }}
            PORT=${{ vars.APP_PORT }}
            DB_URL=${{ secrets.APP_DB_URL }}
            REDIS_HOST=${{ vars.APP_REDIS_HOST }}
            REDIS_PORT=${{ vars.APP_REDIS_PORT }}
            REDIS_TTL=${{ vars.APP_REDIS_TTL }}
            BULL_BOARD_USER=${{ secrets.APP_BULL_BOARD_USER }}
            BULL_BOARD_PASSWORD=${{ secrets.APP_BULL_BOARD_PASSWORD }}
            BITRIX_CLIENT_ID=${{ secrets.APP_BITRIX_CLIENT_ID }}
            BITRIX_CLIENT_SECRET=${{ secrets.APP_BITRIX_CLIENT_SECRET }}
            BITRIX_REDIRECT_URI=${{ secrets.APP_BITRIX_REDIRECT_URI }}
            BITRIX_DOMAIN=${{ secrets.APP_BITRIX_DOMAIN }}
            ENVEOF

            docker login registry.andrewpodgola.pro -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans
